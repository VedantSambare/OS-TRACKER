<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEDU OS — Personal Life OS</title>
<style>
  :root{
    --bg:#0a0d16;
    --panel:#12161f;
    --panel2:#151a25;
    --border:#232838;
    --text:#e7e9ee;
    --muted:#8892a4;
    --muted2:#5f6779;
    --purple:#8b6cf9;
    --purple-dim:#7c5cf0;
    --green:#22c55e;
    --orange:#f5a623;
    --blue:#3ba7ff;
    --pink:#ef5d9d;
    --cyan:#22d3d3;
    --red:#f0475d;
    --yellow:#f2c94c;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    display:flex;
    min-height:100vh;
  }
  a{color:inherit;text-decoration:none;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#2a2f3f;border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:250px;
    min-width:250px;
    background:#0d111a;
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    height:100vh;
    position:sticky;
    top:0;
    overflow-y:auto;
    padding:18px 14px;
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    padding:6px 8px 18px 8px;
    border-bottom:1px solid var(--border);
    margin-bottom:12px;
  }
  .brand .logo{
    width:42px;height:42px;border-radius:12px;
    background:linear-gradient(135deg,var(--purple),#5b3df0);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;color:white;
  }
  .brand h1{font-size:15px;margin:0;color:white;letter-spacing:.3px;}
  .brand p{font-size:11px;margin:1px 0 0 0;color:var(--muted);}

  .nav-item{
    display:flex;align-items:center;gap:12px;
    padding:10px 12px;border-radius:10px;
    font-size:13.5px;color:#b9bfcc;
    cursor:pointer;margin-bottom:2px;
    transition:background .15s, color .15s;
    white-space:nowrap;
  }
  .nav-item .ic{width:18px;text-align:center;font-size:15px;}
  .nav-item:hover{background:#171c28;color:white;}
  .nav-item.active{
    background:linear-gradient(135deg,var(--purple-dim),#5b3df0);
    color:white;font-weight:600;
  }
  .nav-section{margin-top:4px;}

  .focus-box{
    margin-top:16px;
    background:#141225;
    border:1px solid #2c2560;
    border-radius:14px;
    padding:14px;
    text-align:center;
  }
  .focus-box .tag{
    font-size:10px;letter-spacing:.6px;color:var(--purple);font-weight:700;margin-bottom:8px;
  }
  .focus-box .time{font-size:26px;font-weight:700;color:white;margin:4px 0 2px 0;}
  .focus-box .sub{font-size:11px;color:var(--muted);margin-bottom:10px;}
  .focus-btn{
    background:var(--purple-dim);color:white;border:none;
    padding:8px 0;width:100%;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;
  }
  .focus-btn:hover{background:#6b4cf0;}

  /* ---------- Main ---------- */
  .main{flex:1;min-width:0;padding:26px 30px 90px 30px;}
  .topbar{
    display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:22px;
  }
  .topbar h2{font-size:26px;margin:0 0 4px 0;color:white;}
  .topbar .quote{color:var(--muted);font-size:13.5px;margin:0;font-style:italic;}
  .topbar-right{display:flex;gap:10px;}
  .pill{
    background:var(--panel);border:1px solid var(--border);
    padding:9px 16px;border-radius:20px;font-size:13px;color:#c7cbd6;
    display:flex;align-items:center;gap:8px;
  }

  h3.page-title{font-size:22px;margin:0 0 16px 0;color:white;}

  /* Stat cards */
  .stat-grid{
    display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px;
  }
  @media(max-width:1400px){.stat-grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:800px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
  .stat-card{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:16px;position:relative;overflow:hidden;
  }
  .stat-card .top-row{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;margin-bottom:10px;}
  .stat-card .icon{font-size:16px;}
  .stat-card .value{font-size:22px;font-weight:700;color:white;margin-bottom:2px;}
  .stat-card .foot{font-size:11.5px;color:var(--muted2);margin-bottom:10px;}
  .bar-track{height:6px;border-radius:6px;background:#232838;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;}

  /* Panels grid */
  .grid3{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:16px;margin-bottom:16px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .grid3b{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
  @media(max-width:1200px){.grid3,.grid2,.grid3b{grid-template-columns:1fr;}}

  .card{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px;min-width:0;
  }
  .card h4{
    font-size:12.5px;letter-spacing:.5px;text-transform:uppercase;margin:0 0 14px 0;
    display:flex;justify-content:space-between;align-items:center;
  }
  .card h4 .label{font-weight:700;}
  .card h4 .addbtn{
    background:var(--purple-dim);color:white;border:none;border-radius:7px;
    font-size:11px;padding:5px 10px;cursor:pointer;text-transform:none;letter-spacing:0;font-weight:600;
  }
  .card h4 .addbtn:hover{background:#6b4cf0;}
  .linkout{color:var(--purple);font-size:12.5px;display:inline-flex;align-items:center;gap:4px;margin-top:10px;cursor:pointer;}

  table.tsk{width:100%;border-collapse:collapse;font-size:12.8px;}
  table.tsk th{text-align:left;color:var(--muted2);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--border);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;}
  table.tsk td{padding:8px 8px;border-bottom:1px solid #1a1e29;color:#d5d8e0;}
  table.tsk tr:last-child td{border-bottom:none;}
  .prio-high{color:var(--red);}
  .prio-medium{color:var(--orange);}
  .prio-low{color:var(--green);}
  .chk{
    width:17px;height:17px;border-radius:5px;border:1.5px solid #3a4053;
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:transparent;font-size:12px;
  }
  .chk.done{background:var(--green);border-color:var(--green);color:#08130a;}
  .delbtn{background:none;border:none;color:#59606f;cursor:pointer;font-size:13px;padding:2px 6px;}
  .delbtn:hover{color:var(--red);}

  .donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .donut{
    width:150px;height:150px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;
  }
  .donut .hole{
    width:96px;height:96px;background:var(--panel);border-radius:50%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .donut .hole b{font-size:22px;color:white;}
  .donut .hole span{font-size:10.5px;color:var(--muted);}
  .legend{flex:1;min-width:140px;}
  .legend-row{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;padding:5px 0;color:#cfd3dc;}
  .legend-row .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px;}
  .legend-row b{color:white;}

  .barchart{display:flex;align-items:flex-end;gap:10px;height:150px;margin-top:6px;}
  .barchart .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:3px;}
  .barchart .bars{display:flex;align-items:flex-end;gap:2px;height:120px;}
  .barchart .b{width:9px;border-radius:3px 3px 0 0;}
  .barchart .day{font-size:10.5px;color:var(--muted2);margin-top:6px;}
  .chart-legend{display:flex;gap:16px;font-size:11.5px;color:var(--muted);margin-top:10px;}
  .chart-legend .dot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:6px;}

  .goal-row{margin-bottom:14px;}
  .goal-row .grow{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:#dfe2e8;}
  .goal-row .grow .pct{color:var(--muted);font-size:12px;}

  .habit-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .habit-table th{color:var(--muted2);font-weight:600;padding:6px 4px;text-align:center;font-size:11px;}
  .habit-table th:first-child{text-align:left;}
  .habit-table td{padding:7px 4px;text-align:center;border-top:1px solid #1a1e29;}
  .habit-table td:first-child{text-align:left;color:#d5d8e0;}
  .hcell{
    width:20px;height:20px;border-radius:50%;border:1.5px solid #3a4053;display:inline-flex;
    align-items:center;justify-content:center;cursor:pointer;color:transparent;font-size:11px;
  }
  .hcell.done{background:var(--green);border-color:var(--green);color:#08130a;}

  .meal-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid #1a1e29;font-size:13px;}
  .meal-row:first-of-type{border-top:none;}
  .meal-row .mi{font-size:16px;width:20px;}
  .meal-row .mname{flex:1;color:#dfe2e8;}
  .meal-row .mtype{color:var(--muted2);font-size:11px;width:70px;}

  .event-row,.prio-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #1a1e29;font-size:13px;}
  .event-row:first-of-type,.prio-row:first-of-type{border-top:none;}
  .event-row .ei{font-size:15px;}
  .event-row .ename{flex:1;color:#dfe2e8;}
  .event-row .edate{font-size:12px;color:var(--muted);}
  .prio-row .pnum{
    width:20px;height:20px;border-radius:50%;background:#232838;color:var(--purple);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  }
  .prio-row .pname{flex:1;color:#dfe2e8;}
  .quote-box{
    background:#171225;border:1px solid #2c2560;border-radius:10px;padding:10px 12px;margin-top:12px;font-size:12px;color:#cfc9f5;
  }

  .bottomnav{
    position:fixed;bottom:0;left:250px;right:0;
    background:#0d111a;border-top:1px solid var(--border);
    display:flex;gap:6px;padding:10px 24px;overflow-x:auto;
    z-index:20;
  }
  .bottomnav .bitem{
    display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:20px;font-size:12.5px;
    color:var(--muted);cursor:pointer;white-space:nowrap;border:1px solid transparent;
  }
  .bottomnav .bitem.active{background:linear-gradient(135deg,var(--purple-dim),#5b3df0);color:white;}
  .bottomnav .bitem:hover:not(.active){background:#171c28;}

  /* Generic list page */
  .add-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .add-row input, .add-row select{
    background:var(--panel2);border:1px solid var(--border);color:var(--text);
    padding:9px 12px;border-radius:9px;font-size:13px;outline:none;
  }
  .add-row input:focus, .add-row select:focus{border-color:var(--purple-dim);}
  .add-row input[type=text]{flex:1;min-width:160px;}
  .add-row button{
    background:var(--purple-dim);color:white;border:none;border-radius:9px;padding:9px 18px;
    font-size:13px;cursor:pointer;font-weight:600;
  }
  .add-row button:hover{background:#6b4cf0;}

  .list-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:8px 18px;}
  .list-row{
    display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid #1a1e29;font-size:13.5px;
  }
  .list-row:last-child{border-bottom:none;}
  .list-row .lmain{flex:1;color:#e2e5ec;}
  .list-row .lmain.done{color:#5f6779;text-decoration:line-through;}
  .list-row .ltag{font-size:11px;padding:3px 9px;border-radius:12px;background:#1f2536;color:var(--muted);}
  .empty-state{padding:40px 10px;text-align:center;color:var(--muted2);font-size:13px;}

  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  @media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .kpi .k-label{font-size:11.5px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
  .kpi .k-val{font-size:21px;font-weight:700;color:white;}

  .progress-item{margin-bottom:16px;}
  .progress-item .pi-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
  .progress-item .pi-top .nm{color:#e2e5ec;}
  .progress-item .pi-top .pc{color:var(--muted);}

  select option{background:#151a25;}

  ::placeholder{color:#5a6172;}

  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:900px){.settings-grid{grid-template-columns:1fr;}}
  .setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #1a1e29;font-size:13.5px;}
  .setting-row:last-child{border-bottom:none;}
  .toggle{width:40px;height:22px;border-radius:20px;background:#232838;position:relative;cursor:pointer;flex-shrink:0;}
  .toggle.on{background:var(--purple-dim);}
  .toggle .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;background:white;border-radius:50%;transition:left .15s;}
  .toggle.on .knob{left:20px;}

  textarea.note-area{
    width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    border-radius:9px;padding:12px;font-size:13.5px;font-family:inherit;resize:vertical;min-height:90px;outline:none;
  }
  textarea.note-area:focus{border-color:var(--purple-dim);}

  .journal-entry{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
  .journal-entry .jdate{font-size:11.5px;color:var(--purple);font-weight:700;margin-bottom:6px;}
  .journal-entry .jtext{font-size:13.5px;color:#d9dce3;white-space:pre-wrap;}

  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid var(--border);
    border-left:3px solid var(--green);padding:12px 18px;border-radius:10px;font-size:13px;color:white;
    box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:100;opacity:0;transform:translateY(10px);transition:all .25s;
  }
  .toast.show{opacity:1;transform:translateY(0);}
</style>
</head>

// Computes the current habit streak live from the habit grid: consecutive days,
// counting back from the most recent tracked day, where every habit is checked off.
function computeHabitStreak(){
  const habits = state.habits;
  if(!habits.length) return 0;
  const days = habits[0].week.length;
  let current = 0;
  for(let d=days-1; d>=0; d--){
    const allDone = habits.every(h => h.week[d]);
    if(allDone) current++; else break;
  }
  if(current > state.habitStreakBest) state.habitStreakBest = current;
  return current;
}

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}
function priorityClass(p){ return p==='High'?'prio-high':p==='Medium'?'prio-medium':'prio-low'; }

function conicGradient(segments){
  // segments: [{value, color}]
  const total = segments.reduce((a,s)=>a+s.value,0) || 1;
  let acc=0; const parts=[];
  segments.forEach(s=>{
    const start = acc/total*360;
    acc += s.value;
    const end = acc/total*360;
    parts.push(`${s.color} ${start}deg ${end}deg`);
  });
  return `conic-gradient(${parts.join(',')})`;
}

let focusInterval=null, focusSeconds=25*60, focusRunning=false;
function setupFocusTimer(){
  const btn = document.getElementById('focusBtn');
  const disp = document.getElementById('focusTime');
  if(!btn) return;
  function updateDisp(){
    const m = String(Math.floor(focusSeconds/60)).padStart(2,'0');
    const s = String(focusSeconds%60).padStart(2,'0');
    disp.textContent = `${m}:${s}`;
  }
  updateDisp();
  btn.onclick = ()=>{
    if(focusRunning){
      clearInterval(focusInterval);
      focusRunning=false;
      btn.textContent='Resume';
    } else {
      focusRunning=true;
      btn.textContent='Pause';
      focusInterval=setInterval(()=>{
        focusSeconds--;
        if(focusSeconds<=0){
          clearInterval(focusInterval);
          focusRunning=false;
          focusSeconds=25*60;
          btn.textContent='Start';
          toast('🎉 Focus session complete!');
        }
        updateDisp();
      },1000);
    }
  };
}

// Used for: To-Do, Grocery, Notes, Journal, Skills, Internship, Earn Money, Events(Calendar), Priorities
function genericListPage(opts){
  const wrap = el(`<div></div>`);
  wrap.appendChild(el(`<h3 class="page-title">${opts.title}</h3>`));

  const addRow = el(`<div class="add-row"></div>`);
  opts.fields.forEach(f=>{
    if(f.type==='select'){
      const sel = el(`<select data-field="${f.name}">${f.options.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`);
      addRow.appendChild(sel);
    } else {
      const inp = el(`<input type="${f.type||'text'}" placeholder="${f.placeholder}" data-field="${f.name}">`);
      addRow.appendChild(inp);
    }
  });
  const addBtn = el(`<button>+ Add</button>`);
  addRow.appendChild(addBtn);
  wrap.appendChild(addRow);

  const listCard = el(`<div class="list-card"></div>`);
  const items = opts.getItems();
  if(items.length===0){
    listCard.appendChild(el(`<div class="empty-state">Nothing here yet — add your first item above.</div>`));
  } else {
    items.forEach(item=>{
      listCard.appendChild(opts.renderRow(item));
    });
  }
  wrap.appendChild(listCard);

  addBtn.addEventListener('click',()=>{
    const values={};
    let valid=true;
    addRow.querySelectorAll('[data-field]').forEach(f=>{
      values[f.dataset.field]=f.value;
      if(f.tagName==='INPUT' && f.value.trim()==='' ) valid=false;
    });
    if(!valid){ toast('Please fill in the required field'); return; }
    opts.onAdd(values);
    addRow.querySelectorAll('input').forEach(f=>f.value='');
    render();
  });

  return wrap;
}

function rowWithDelete(mainHtml, tagHtml, onDelete, done, onToggle){
  const row = el(`
    <div class="list-row">
      ${onToggle? `<span class="chk ${done?'done':''}">✓</span>` : ''}
      <span class="lmain ${done?'done':''}">${mainHtml}</span>
      ${tagHtml?`<span class="ltag">${tagHtml}</span>`:''}
      <button class="delbtn">✕</button>
    </div>
  `);
  if(onToggle){ row.querySelector('.chk').addEventListener('click',onToggle); }
  row.querySelector('.delbtn').addEventListener('click',onDelete);
  return row;
}

  const grid = el(`<div class="grid2"></div>`);

  const left = el(`<div class="card"></div>`);
  left.appendChild(el(`
    <h4><span class="label" style="color:var(--purple)">EXPENSES BREAKDOWN</span></h4>

      <div class="donut" style="background:${conicGradient(segs)}"><div class="hole"><b>${fmt(total)}</b><span>Total</span></div></div>
      <div class="legend">${f.expenseCategories.map(c=>`<div class="legend-row"><span><span class="dot" style="background:${COLORS[c.color]}"></span>${c.name}</span><b>${fmt(c.amount)}</b></div>`).join('')}</div>
    </div>
  `));
  grid.appendChild(left);

  const right = el(`<div class="card"></div>`);
  right.appendChild(el(`<h4><span class="label" style="color:var(--purple)">TRANSACTIONS</span></h4>`));
  const addRow = el(`
    <div class="add-row">
      <input type="text" placeholder="Description" id="txDesc">
      <input type="number" placeholder="Amount ₹" id="txAmt" style="width:120px;">
      <select id="txType"><option value="expense">Expense</option><option value="income">Income</option></select>
      <button id="txAdd">+ Add</button>
    </div>
  `);
  right.appendChild(addRow);
  const listCard = el(`<div class="list-card"></div>`);
  if(f.transactions.length===0){
    listCard.appendChild(el(`<div class="empty-state">No transactions yet.</div>`));
  } else {
    f.transactions.slice().reverse().forEach(t=>{
      const row = el(`
        <div class="list-row">
          <span class="lmain">${t.desc}</span>
          <span class="ltag" style="color:${t.type==='income'?'var(--green)':'var(--red)'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</span>
          <button class="delbtn">✕</button>
        </div>
      `);
      row.querySelector('.delbtn').addEventListener('click',()=>{
        f.transactions=f.transactions.filter(x=>x.id!==t.id);
        recalcFinance();
        render();
      });
      listCard.appendChild(row);
    });
  }
  right.appendChild(listCard);
  grid.appendChild(right);
  wrap.appendChild(grid);

  addRow.querySelector('#txAdd').addEventListener('click',()=>{
    const d=addRow.querySelector('#txDesc').value.trim();
    const a=parseFloat(addRow.querySelector('#txAmt').value)||0;
    const ty=addRow.querySelector('#txType').value;
    if(!d||a<=0){toast('Enter description and amount');return;}
    f.transactions.push({id:nid(),desc:d,amount:a,type:ty});
    recalcFinance();
    render();
  });

  return wrap;
}
function recalcFinance(){
  const f = state.finance;
  const income = f.transactions.filter(t=>t.type==='income').reduce((a,t)=>a+Number(t.amount),0);
  const expenses = f.transactions.filter(t=>t.type==='expense').reduce((a,t)=>a+Number(t.amount),0);
  f.income = income || f.income;
  f.expenses = expenses;
  f.savings = Math.max(0, f.income - f.expenses);
  f.budgetLeft = f.savings;
}

    const t=parseFloat(addRow.querySelector('#sgTarget').value)||1;
    if(!n){toast('Enter a goal name');return;}
    state.savingsGoals.push({id:nid(),name:n,saved:s,target:t});
    render();
  });
  return wrap;
}

/* ============================= PAGE: SETTINGS ============================= */
function pageSettings(){
  const wrap = el(`<div></div>`);
  wrap.appendChild(el(`<h3 class="page-title">Settings</h3>`));
  const grid = el(`<div class="settings-grid"></div>`);

  const profileCard = el(`
    <div class="card">
      <h4><span class="label" style="color:var(--purple)">PROFILE</span></h4>
      <div class="add-row" style="margin-bottom:0;">
        <input type="text" id="setName" value="${state.userName}" placeholder="Your name">
        <button id="setNameBtn">Save</button>
      </div>
    </div>
  `);
  profileCard.querySelector('#setNameBtn').addEventListener('click',()=>{
    const v = profileCard.querySelector('#setName').value.trim();
    if(v){ state.userName = v; toast('Profile updated'); render(); }
  });
  grid.appendChild(profileCard);

  const prefsCard = el(`<div class="card"><h4><span class="label" style="color:var(--purple)">PREFERENCES</span></h4></div>`);
  const prefs = [
    {key:'darkMode',label:'Dark Mode'},
    {key:'notifications',label:'Notifications'},
    {key:'focusReminders',label:'Focus Reminders'},
    {key:'weekStartsMonday',label:'Week Starts on Monday'},
  ];
  prefs.forEach(p=>{
    const row = el(`
      <div class="setting-row">
        <span>${p.label}</span>
        <div class="toggle ${state.settings[p.key]?'on':''}" data-key="${p.key}"><div class="knob"></div></div>
      </div>
    `);
    row.querySelector('.toggle').addEventListener('click',function(){
      state.settings[p.key] = !state.settings[p.key];
      this.classList.toggle('on');
    });
    prefsCard.appendChild(row);
  });
  grid.appendChild(prefsCard);

  wrap.appendChild(grid);

  const dangerCard = el(`
    <div class="card" style="margin-top:16px;">
      <h4><span class="label" style="color:var(--purple)">DATA</span></h4>
      <p style="color:var(--muted);font-size:12.5px;margin:0 0 12px 0;">This is a live in-browser demo — your changes exist for this session. Reset to restore the original sample data.</p>
      <button class="focus-btn" style="width:auto;padding:9px 18px;" id="resetBtn">Reset All Data</button>
    </div>
  `);
  dangerCard.querySelector('#resetBtn').addEventListener('click',()=>{
    if(confirm('Reset all data back to the sample demo?')){
      location.reload();
    }
  });
  wrap.appendChild(dangerCard);

  return wrap;
}

/* ============================= ROUTER ============================= */
function pageBody(){
  switch(state.page){
    case 'dashboard': return pageDashboard();
    case 'schedule': return pageSchedule();
    case 'todo': return pageTodo();
    case 'studyplan': return pageStudyPlan();
    case 'habits': return pageHabits();
    case 'meals': return pageMeals();
    case 'grocery': return pageGrocery();
    case 'finance': return pageFinance();
    case 'savings': return pageSavings();
    case 'skills': return pageSkills();
    case 'internship': return pageInternship();
    case 'earn': return pageEarn();
    case 'calendar': return pageCalendar();
    case 'journal': return pageJournal();
    case 'notes': return pageNotes();
    case 'settings': return pageSettings();
    default: return pageDashboard();
  }
}

function render(){
  renderSidebar();
  renderBottomNav();
  const main = document.getElementById('main');
  main.innerHTML='';
  main.appendChild(pageBody());
}

render();
</script>
</body>
</html>
